name: Bug report
description: Report a reproducible problem in Wanta
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include credentials or security vulnerabilities. Follow SECURITY.md for private reports.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Wanta version or commit
      placeholder: 0.0.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime mode
      options:
        - Local BYOK
        - OOMOL signed in
        - Before runtime selection
        - Unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence. Redact private data.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Relevant diagnostics
      description: Paste only redacted logs, screenshots, or error messages.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for an existing issue.
          required: true
        - label: I removed tokens, API keys, cookies, account data, and private file contents.
          required: true
        - label: This is not a security vulnerability.
          required: true

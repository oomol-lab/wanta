name: Feature request
description: Propose a focused improvement to Wanta
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or workflow limitation should be addressed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe the desired behavior without requiring a particular implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note current workarounds or other approaches.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope checks
      options:
        - label: I considered local BYOK and signed-in OOMOL runtime behavior separately.
        - label: I considered credential, permission, and renderer-boundary implications.
